<!-- copilot: made the html myself, let copilot style tailwind. it looks 🔥 -->
<!DOCTYPE html>
<html lang="en" class="h-full antialiased bg-neutral-950">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack Macros</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .font-sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
    <link rel="icon" type="image/png" href="logo-rounded.png">
</head>

<body class="h-full font-sans antialiased text-orange-100/65 selection:bg-yellow-500 selection:text-orange-950 flex items-center justify-center p-4 bg-neutral-950">
    <div class="w-full max-w-2xl bg-orange-950/25 backdrop-blur-xl border border-white/5 rounded-2xl shadow-2xl overflow-hidden ring-1 ring-white/10">
        
        <div class="p-8 sm:p-10">
            <div class="flex items-center space-x-3 mb-6">
                <!-- Icon -->
                <div class="h-10 w-10 rounded-lg overflow-hidden shadow-lg shadow-yellow-500/20 ring-1 ring-white/10">
                    <img src="logo.png" alt="Slack Macros logo" class="h-full w-full object-cover" />
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold text-white tracking-tight">Slack Macros</h1>
            </div>
            
            <p class="mb-8 text-lg leading-relaxed">Here are the current available commands you can use with <code class="text-yellow-300 font-mono bg-yellow-400/10 px-1.5 py-0.5 rounded border border-yellow-400/20">/slam</code> within the slack:</p>
            
            <div class="commands bg-black/45 rounded-xl p-6 border border-white/5 relative overflow-hidden">
                <!-- Decorative glow -->
                <div class="absolute -top-12 -right-12 w-24 h-24 bg-yellow-400/10 rounded-full blur-2xl pointer-events-none"></div>

                <!-- Skeleton Loader for initial state -->
                <ul class="space-y-3 animate-pulse">
                    <li class="flex items-center">
                         <div class="w-32 h-6 bg-orange-950/70 rounded mr-3"></div>
                         <div class="flex-1 h-5 bg-orange-950/40 rounded"></div>
                    </li>
                    <li class="flex items-center">
                         <div class="w-24 h-6 bg-orange-950/70 rounded mr-3"></div>
                         <div class="flex-1 h-5 bg-orange-950/40 rounded w-2/3"></div>
                    </li>
                    <li class="flex items-center">
                         <div class="w-28 h-6 bg-orange-950/70 rounded mr-3"></div>
                         <div class="flex-1 h-5 bg-orange-950/40 rounded w-1/2"></div>
                    </li>
                </ul>
            </div>
        </div>
        
        <div class="bg-black/55 p-4 text-center text-xs font-medium text-orange-200/35 border-t border-white/5">
            Press <span class="text-orange-200/60 font-mono">/slam help</span> for usage information
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
